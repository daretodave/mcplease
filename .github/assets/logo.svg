<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" role="img" aria-label="mcplease — share your MCP server as a link">
  <title>mcplease — share your MCP server as a link</title>
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7A55F5" stop-opacity="0.22" />
      <stop offset="0.55" stop-color="#7A55F5" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#C9CDD4" />
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="758" height="238" rx="28" fill="#0B0D12" stroke="#7A55F5" stroke-opacity="0.30" />
  <rect x="1" y="1" width="758" height="238" rx="28" fill="url(#glow)" />

  <!-- brand mark: speech bubble + "yes" check, scaled from the 32×32 app mark -->
  <g transform="translate(188 60) scale(2.6)">
    <rect x="3" y="3" width="26" height="19.5" rx="7.5" fill="#7A55F5" />
    <path d="M9.6 21 L9.1 27.5 A0.55 0.55 0 0 0 10 27.9 L15.8 22 Z" fill="#7A55F5" />
    <path d="M10.6 13.2 L14 16.7 L21.2 9.2" fill="none" stroke="#FFFFFF" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <text x="282" y="130" font-family="'Segoe UI',system-ui,Helvetica,Arial,sans-serif" font-size="72" font-weight="800" letter-spacing="-3" fill="url(#ink)">mcplease</text>
  <text x="380" y="182" text-anchor="middle" font-family="'Segoe UI',system-ui,Helvetica,Arial,sans-serif" font-size="19" letter-spacing="1.5" fill="#98A2AE">share your MCP server as a link</text>
</svg>
